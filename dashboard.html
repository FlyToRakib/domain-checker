<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Domain Checker | Dev v1.0</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #f8fafc;
      --card: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --terminal-bg: #0f172a;
      --border: #e2e8f0;
    }

    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 30px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--card);
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 15px;
    }

    h2 { margin: 0; font-size: 22px; font-weight: 800; }
    .dev-badge { font-size: 11px; background: #fee2e2; color: #b91c1c; padding: 4px 10px; border-radius: 20px; font-weight: bold; }

    .grid-inputs {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .field-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

    textarea, input, select {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }

    textarea { height: 120px; font-family: 'Consolas', monospace; }

    /* Button Controls Area */
    .action-row { display: flex; gap: 12px; margin-top: 10px; }
    
    #startBtn {
      flex: 3;
      padding: 15px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    #stopBtn {
      flex: 1;
      padding: 15px;
      background-color: var(--danger);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: none; /* Hidden by default */
    }

    #startBtn:disabled, #stopBtn:disabled { background-color: var(--text-muted); cursor: not-allowed; }

    /* Loading Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .results-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 30px;
    }

    .panel-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .panel-label h3 { font-size: 13px; margin: 0; color: var(--text-muted); text-transform: uppercase; }

    .terminal {
      background: var(--terminal-bg);
      color: #94a3b8;
      padding: 15px;
      height: 380px;
      overflow-y: auto;
      border-radius: 8px;
      font-family: 'Consolas', monospace;
      font-size: 13px;
    }

    .entry { margin-bottom: 6px; padding-left: 10px; border-left: 2px solid transparent; }
    .entry.avail { color: var(--success); border-left-color: var(--success); font-weight: bold; }
    .entry.taken { color: var(--danger); }
    .entry.sys { color: var(--primary); border-bottom: 1px solid #1e293b; padding-bottom: 5px; margin-bottom: 10px; }
    .entry.warn { color: var(--warning); }

    .export-btn { padding: 6px 12px; background: var(--success); color: white; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; }
    .export-btn:disabled { opacity: 0.3; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h2>Domain Checker <span class="dev-badge">v1.0 DEV</span></h2>
  </header>
  
  <div class="grid-inputs">
    <div class="field-group">
      <label>Base Domains</label>
      <textarea id="domainList" placeholder="google, facebook, youtube, openai..."></textarea>
    </div>

    <div class="field-group">
      <label>Target Extension</label>
      <input type="text" id="tldInput" list="tldList" value=".com">
      <datalist id="tldList">
        <option value=".com">.com</option><option value=".net">.net</option>
        <option value=".org">.org</option><option value=".io">.io</option>
        <option value=".ai">.ai</option><option value=".app">.app</option>
        <option value=".dev">.dev</option><option value=".co">.co</option>
      </datalist>
    </div>

    <div class="field-group">
      <label>Check Strategy</label>
      <select id="providerSelect">
        <option value="rdap">Public RDAP (Fast API)</option>
        <option value="hostinger">Hostinger (DOM-Scraper)</option>
        <option value="namecheap">Namecheap (Template)</option>
        <option value="godaddy">GoDaddy (Template)</option>
      </select>
    </div>
  </div>

  <div class="action-row">
    <button id="startBtn">
      <span class="spinner" id="btnSpinner"></span>
      <span id="btnText">Scan Availability</span>
    </button>
    <button id="stopBtn">Stop Scan</button>
  </div>

  <div class="results-area">
    <div class="panel">
      <div class="panel-label"><h3>Process Log</h3></div>
      <div class="terminal" id="fullLog"></div>
    </div>
    <div class="panel">
      <div class="panel-label">
        <h3>Found Available</h3>
        <button id="exportBtn" class="export-btn" disabled>Export JSON</button>
      </div>
      <div class="terminal" id="availLog"></div>
    </div>
  </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
