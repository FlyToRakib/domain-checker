<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Domain Checker</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #f8fafc;
      --card: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --terminal-bg: #0f172a;
      --border: #e2e8f0;
    }

    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 40px;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--card);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }

    h2 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.025em; }
    .status-badge { font-size: 11px; background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 99px; font-weight: 700; text-transform: uppercase; }

    .config-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .field-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    textarea, input, select {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s ease;
      outline: none;
      background: #fff;
    }

    textarea:focus, input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
    textarea { height: 140px; font-family: 'JetBrains Mono', monospace; line-height: 1.6; resize: none; }

    .action-row { display: flex; gap: 16px; margin-top: 8px; }
    
    #startBtn {
      flex: 3;
      padding: 16px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    #stopBtn {
      flex: 1;
      padding: 16px;
      background-color: var(--danger);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: none; /* Hidden during idle */
    }

    #startBtn:disabled, #stopBtn:disabled { background-color: var(--border); color: var(--text-muted); cursor: not-allowed; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .results-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 40px;
    }

    .panel-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .panel-label h3 { font-size: 12px; margin: 0; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }

    .terminal {
      background: var(--terminal-bg);
      color: #cbd5e1;
      padding: 20px;
      height: 420px;
      overflow-y: auto;
      border-radius: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      border: 1px solid #1e293b;
    }

    .entry { margin-bottom: 6px; padding-left: 12px; border-left: 2px solid transparent; }
    .entry.avail { color: var(--success); border-left-color: var(--success); font-weight: bold; }
    .entry.taken { color: var(--text-muted); opacity: 0.7; }
    .entry.sys { color: var(--primary); border-bottom: 1px solid #1e293b; padding-bottom: 8px; margin-bottom: 12px; }
    .entry.warn { color: var(--warning); }

    .export-btn { padding: 8px 16px; background: var(--success); color: white; border: none; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .export-btn:disabled { opacity: 0.2; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h2>Domain Checker <span style="color:var(--text-muted); font-weight: 400; font-size: 16px; margin-left: 10px;">Aggregator</span></h2>
    <span class="status-badge">v1.0 Stable</span>
  </header>
  
  <div class="config-grid">
    <div class="field-group">
      <label>Base Domains</label>
      <textarea id="domainList" placeholder="google, facebook, youtube..."></textarea>
    </div>

    <div class="field-group">
      <label>Extension (TLD)</label>
      <input type="text" id="tldInput" list="tldList" value=".com">
      <datalist id="tldList">
        <option value=".com">.com</option><option value=".net">.net</option>
        <option value=".org">.org</option><option value=".io">.io</option>
        <option value=".ai">.ai</option><option value=".app">.app</option>
        <option value=".dev">.dev</option><option value=".co">.co</option>
        <option value=".me">.me</option><option value=".info">.info</option>
      </datalist>
    </div>

    <div class="field-group">
      <label>Provider Strategy</label>
      <select id="providerSelect">
        <option value="rdap">Public RDAP (Fast API)</option>
        <option value="hostinger">Hostinger (DOM-Scraper)</option>
        <option value="namecheap">Namecheap (DOM-Scraper)</option>
        <option value="godaddy">GoDaddy (DOM-Scraper)</option>
      </select>
    </div>
  </div>

  <div class="action-row">
    <button id="startBtn">
      <span class="spinner" id="btnSpinner"></span>
      <span id="btnText">Scan Availability</span>
    </button>
    <button id="stopBtn">Stop Scan</button>
  </div>

  <div class="results-area">
    <div class="panel">
      <div class="panel-label"><h3>Process Monitor</h3></div>
      <div class="terminal" id="fullLog"></div>
    </div>
    <div class="panel">
      <div class="panel-label">
        <h3>Available Hits</h3>
        <button id="exportBtn" class="export-btn" disabled>Export JSON</button>
      </div>
      <div class="terminal" id="availLog"></div>
    </div>
  </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
