<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Domain Availability Checker</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="container">
  <header>
    <h2>Domain Availability Checker <span style="color:var(--text-muted); font-weight: 400; font-size: 16px; margin-left: 10px;">Aggregator</span></h2>
    <span class="status-badge">v1.2.0 Stable</span>
  </header>
  
  <p class="app-description">Bulk check domain availability across multiple TLDs fast via RDAP and live registrars. Features CSV export & local saving.</p>
  
  <div class="config-grid">
    <div class="field-group">
      <label>Base Domains <span class="tip-text">(line break or comma-separated)</span></label>
      <textarea id="domainList" placeholder="google, facebook, youtube..."></textarea>
    </div>

    <div class="col-2-stack">
      <div class="field-group" style="flex: 1; min-height: 0;">
        <label>Extensions (TLD) <span class="tip-text">(Select multiple)</span></label>
        <div class="tld-wrapper">
          <div class="custom-tld-input-group">
            <input type="text" id="customTldInput" placeholder="Add custom (e.g. .xyz)">
            <button id="addCustomTldBtn">Add</button>
            <button id="selectAllTldsBtn">Select All</button>
          </div>
          <div class="tld-checkbox-list" id="tldContainer">
            </div>
        </div>
      </div>
      <div class="field-group" style="height: auto;">
        <label>Provider Strategy</label>
        <select id="providerSelect">
          <option value="icann_rdap" selected>ICANN RDAP (Fast API)</option>
          <option value="rdap">Public RDAP (Fast API)</option>
          <option value="google_rdap">Google Registry RDAP (Fast API)</option>
          <option value="godaddy_rdap">GoDaddy Registry RDAP (Fast API)</option>
          <option value="hostinger">Hostinger RDAP (Fast API)</option>
          <option value="namecheap">Namecheap RDAP (Fast API)</option>
          <option value="godaddy">GoDaddy (DOM-Scraper)</option>
          <option value="verisign_rdap">Verisign RDAP (Fast API)</option>
          <option value="pir_rdap">PIR RDAP (Fast API)</option>
          <option value="identity_digital_rdap">Identity Digital RDAP (Fast API)</option>
          <option value="nominet_rdap">Nominet RDAP (Fast API)</option>
          <option value="eurid_rdap">EURid RDAP (Fast API)</option>
          <option value="afnic_rdap">AFNIC RDAP (Fast API)</option>
          <option value="cira_rdap">CIRA RDAP (Fast API)</option>
          <option value="nicbr_rdap">NIC.BR RDAP (Fast API)</option>
          <option value="cnnic_rdap">CNNIC RDAP (Fast API)</option>
          <option value="amazon_rdap">Amazon Registry RDAP (Fast API)</option>
        </select>
      </div>
    </div>

    <div class="field-group">
        <label>Process Monitor</label>
        <div class="terminal" id="fullLog"></div>
    </div>
  </div>

  <div class="action-row">
    <button id="startBtn" class="action-btn">
      <span class="spinner" id="btnSpinner"></span>
      <span id="btnText">Scan Availability</span>
    </button>
    <button id="stopBtn" class="action-btn" style="display: none;">Stop Scan</button>
  </div>

  <div class="results-area">
    <div class="panel">
      <div class="panel-label">
        <h3>Saved Sessions</h3>
        <div class="header-actions">
          <button id="clearAllBtn" class="export-btn danger-outline">Clear All</button>
        </div>
      </div>
      <div class="terminal" id="sessionLog">
          </div>
    </div>
    
    <div class="panel">
      <div class="panel-label">
        <h3>Available Hits (Current)</h3>
        <div class="header-actions">
          <select id="tldFilter" class="filter-dropdown" disabled>
            <option value="ALL">All Scanned</option>
          </select>
          <button id="exportBtn" class="export-btn" disabled>Export CSV</button>
        </div>
      </div>
      <div class="terminal table-view" id="availLog"></div>
    </div>
  </div>
</div>

<div id="sessionViewOverlay">
    <div class="overlay-header">
        <div>
            <h2 id="overlayTitle" style="color: var(--text);">Session View</h2>
            <p id="overlayMeta" class="app-description" style="margin:0;">Data snapshot</p>
        </div>
        <div class="header-actions">
            <button id="overlayExportBtn" class="export-btn">Export CSV</button>
            <button id="closeOverlayBtn" class="overlay-close">Close View</button>
        </div>
    </div>
    <div class="overlay-content terminal table-view" id="overlayTableArea"></div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
